<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AR Biology — Enzyme &amp; Substrate</title>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;background:#000}
    #arjs-video,.a-canvas,a-scene video,a-scene canvas{
      position:fixed!important;top:0!important;left:0!important;
      width:100vw!important;height:100vh!important;object-fit:cover!important;display:block!important;z-index:1!important}

    #hud{position:fixed;inset:0;z-index:10;pointer-events:none;
      font-family:ui-monospace,"SF Mono","Roboto Mono",Menlo,Consolas,monospace;color:#eafff2}
    .bracket{position:absolute;width:40px;height:40px;border:3px solid #5ad1ff;opacity:.85}
    .bracket.tl{top:20px;left:20px;border-right:none;border-bottom:none}
    .bracket.tr{top:20px;right:20px;border-left:none;border-bottom:none}
    .bracket.bl{bottom:118px;left:20px;border-right:none;border-top:none}
    .bracket.br{bottom:118px;right:20px;border-left:none;border-top:none}

    #status{position:absolute;top:22px;left:50%;transform:translateX(-50%);
      background:rgba(6,12,18,.72);border:1px solid rgba(90,209,255,.5);padding:8px 15px;border-radius:999px;
      font-size:12px;letter-spacing:.14em;text-transform:uppercase;display:flex;align-items:center;gap:8px;
      white-space:nowrap;backdrop-filter:blur(6px)}
    #dot{width:9px;height:9px;border-radius:50%;background:#6b7c74;flex:none}
    #status.searching #dot{background:#ffcf4d;animation:pulse 1s infinite}
    #status.locked #dot{background:#5ad1ff;box-shadow:0 0 10px #5ad1ff}
    @keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}

    #panel{position:absolute;left:0;right:0;bottom:0;pointer-events:auto;
      background:linear-gradient(180deg,rgba(6,12,18,0) 0%,rgba(6,12,18,.9) 32%);
      padding:34px 16px 16px;display:flex;flex-direction:column;align-items:center;gap:10px}
    #stagePips{display:flex;gap:7px}
    .pip{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.22)}
    .pip.on{background:#5ad1ff;box-shadow:0 0 8px #5ad1ff}
    #caption{max-width:640px;text-align:center;font-size:16px;line-height:1.45;
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;min-height:44px}
    #caption b{color:#7be0a0}
    #controls{display:flex;gap:10px;align-items:center}
    .btn{pointer-events:auto;cursor:pointer;background:rgba(255,255,255,.08);color:#eafff2;
      border:1px solid rgba(255,255,255,.18);font:inherit;font-size:13px;letter-spacing:.05em;
      padding:11px 16px;border-radius:11px}
    .btn.primary{background:#5ad1ff;color:#04121a;border-color:#5ad1ff;font-weight:700}
    .btn:active{transform:scale(.96)}
    #searchHint{position:absolute;bottom:150px;left:50%;transform:translateX(-50%);
      background:rgba(6,12,18,.7);border:1px solid rgba(255,255,255,.14);padding:8px 15px;border-radius:10px;
      font-size:12px;text-align:center;max-width:86vw;backdrop-filter:blur(6px)}

    #gate{position:fixed;inset:0;z-index:40;background:radial-gradient(120% 120% at 50% 0%,#0c1720 0%,#050708 70%);
      color:#eafff2;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
      padding:28px;font-family:ui-monospace,"SF Mono","Roboto Mono",Menlo,Consolas,monospace}
    #gate h1{font-size:19px;letter-spacing:.16em;margin-bottom:6px}
    #gate .accent{color:#5ad1ff}
    #gate p{font-size:13px;opacity:.85;max-width:340px;line-height:1.6;margin-bottom:22px}
    #startBtn{pointer-events:auto;cursor:pointer;background:#5ad1ff;color:#04121a;border:none;font:inherit;
      font-size:14px;letter-spacing:.12em;text-transform:uppercase;padding:14px 30px;border-radius:12px;font-weight:700}
    #startBtn:disabled{opacity:.6}
    #gate small{display:block;margin-top:18px;font-size:11px;opacity:.55}
    .hidden{display:none!important}
  </style>
</head>
<body>
  <div id="gate">
    <h1><span class="accent">AR</span> ENZYME &amp; SUBSTRATE</h1>
    <p>Point the camera at the <b>reaction card</b> to watch an enzyme catalyse a reaction in 3D.</p>
    <button id="startBtn">Start camera</button>
    <small id="gateNote">Allow camera access when asked</small>
  </div>

  <div id="hud" class="hidden">
    <div class="bracket tl"></div><div class="bracket tr"></div>
    <div class="bracket bl"></div><div class="bracket br"></div>
    <div id="status" class="searching"><span id="dot"></span><span id="label">Searching for card…</span></div>
    <div id="searchHint">Hold the card flat, in good light, ~30&nbsp;cm away.</div>

    <div id="panel" class="hidden">
      <div id="stagePips"></div>
      <div id="caption"></div>
      <div id="controls">
        <button class="btn" id="restartBtn">&#8635; Restart</button>
        <button class="btn primary" id="playBtn">&#10073;&#10073; Pause</button>
        <button class="btn" id="stepBtn">Step &#9654;</button>
      </div>
    </div>
  </div>

  <div id="sceneHost"></div>

  <script>
  (function(){
    var gate=document.getElementById('gate'),startBtn=document.getElementById('startBtn'),
        gateNote=document.getElementById('gateNote'),hud=document.getElementById('hud'),
        statusEl=document.getElementById('status'),labelEl=document.getElementById('label'),
        searchHint=document.getElementById('searchHint'),panel=document.getElementById('panel'),
        pipsEl=document.getElementById('stagePips'),captionEl=document.getElementById('caption'),
        playBtn=document.getElementById('playBtn'),restartBtn=document.getElementById('restartBtn'),
        stepBtn=document.getElementById('stepBtn'),host=document.getElementById('sceneHost');

    // ---- reaction timeline (edit this block to teach a different concept) ----
    var STAGES=[
      {cap:'An <b>enzyme</b> and its <b>substrate</b> \u2014 notice the complementary shapes.'},
      {cap:'The substrate collides with and enters the enzyme\u2019s <b>active site</b>.'},
      {cap:'<b>Induced fit</b>: the active site moulds around the substrate, straining its bonds.'},
      {cap:'Catalysis: the strained bonds break, forming <b>products</b>.'},
      {cap:'Products are released. The enzyme is <b>unchanged</b> and ready to reuse.'}
    ];
    var TARGETS={
      ballA:[[0.95,1.45,0.05],[0.00,0.95,0.02],[0.00,0.95,0.02],[-0.06,1.00,0.02],[-0.55,1.55,0.20]],
      ballB:[[0.95,1.15,0.05],[0.00,0.63,0.02],[0.00,0.63,0.02],[ 0.06,0.58,0.02],[ 0.55,1.45,0.20]],
      bond :[[0.95,1.30,0.05],[0.00,0.79,0.02],[0.00,0.79,0.02],[ 0.00,0.79,0.02],[ 0.00,0.79,0.02]],
      wallL:[[-0.40,0.80,0],[-0.34,0.80,0],[-0.28,0.82,0],[-0.34,0.80,0],[-0.44,0.80,0]],
      wallR:[[ 0.40,0.80,0],[ 0.34,0.80,0],[ 0.28,0.82,0],[ 0.34,0.80,0],[ 0.44,0.80,0]]
    };
    var COLOR={
      ballA:['#F27649','#F27649','#F27649','#46C46A','#46C46A'],
      ballB:['#F27649','#F27649','#F27649','#46C46A','#46C46A']
    };
    var OPACITY={ bond:[1,1,1,0,0], ballA:[1,1,1,1,0], ballB:[1,1,1,1,0] };

    var SCENE=
      '<a-scene embedded vr-mode-ui="enabled:false"'+
      ' renderer="logarithmicDepthBuffer:true;colorManagement:true;antialias:true"'+
      ' arjs="sourceType:webcam;detectionMode:mono;patternRatio:0.5;maxDetectionRate:30;debugUIEnabled:false">'+
      ' <a-entity light="type:ambient;color:#cfe6ff;intensity:0.8"></a-entity>'+
      ' <a-entity light="type:directional;color:#fff;intensity:0.9" position="1 3 2"></a-entity>'+
      ' <a-marker id="rxMarker" type="pattern" url="reaction.patt">'+
      '   <a-entity rotation="-90 0 0">'+
      '     <a-entity id="enzyme">'+
      '       <a-sphere position="0 0.4 0" radius="0.6" scale="1 0.62 0.9" color="#2FB8A8"></a-sphere>'+
      '       <a-box id="wallL" position="-0.4 0.8 0" width="0.16" height="0.5" depth="0.6" color="#23968A"></a-box>'+
      '       <a-box id="wallR" position="0.4 0.8 0"  width="0.16" height="0.5" depth="0.6" color="#23968A"></a-box>'+
      '       <a-text value="ENZYME" align="center" width="3" color="#bfeee7" position="0 0.02 0.35"></a-text>'+
      '     </a-entity>'+
      '     <a-cylinder id="bond" position="0.95 1.30 0.05" radius="0.05" height="0.22" color="#C24E2A"></a-cylinder>'+
      '     <a-sphere id="ballA" position="0.95 1.45 0.05" radius="0.15" color="#F27649"></a-sphere>'+
      '     <a-sphere id="ballB" position="0.95 1.15 0.05" radius="0.15" color="#F27649"></a-sphere>'+
      '     <a-text id="tagSub"  value="SUBSTRATE" align="center" width="3" color="#ffd0b8" position="0.95 1.75 0.05"></a-text>'+
      '     <a-text id="tagProd" value="PRODUCTS"  align="center" width="3" color="#9be8b3" position="0 1.9 0.1" visible="false"></a-text>'+
      '   </a-entity>'+
      ' </a-marker>'+
      ' <a-entity camera></a-entity>'+
      '</a-scene>';

    var parts={}, stage=0, playing=true, last=0, MOVE=0.09, DWELL=2400, timer=0, ready=false;

    function grab(id){var el=document.getElementById(id);return {el:el,o3d:el.object3D,
      mat:(el.getObject3D&&el.getObject3D('mesh'))?el.getObject3D('mesh').material:null};}

    function targetPos(n){ return TARGETS[n]?TARGETS[n][stage]:null; }
    function targetOpacity(n){ return OPACITY[n]?OPACITY[n][stage]:1; }

    function applyInstant(){
      Object.keys(parts).forEach(function(n){
        var t=targetPos(n); if(t){parts[n].o3d.position.set(t[0],t[1],t[2]);}
        if(parts[n].mat){parts[n].mat.transparent=true;parts[n].mat.opacity=targetOpacity(n);}
      });
    }

    function setStage(i,instant){
      stage=i; timer=0;
      captionEl.innerHTML=STAGES[i].cap;
      Array.prototype.forEach.call(pipsEl.children,function(p,k){p.className='pip'+(k===i?' on':'');});
      document.getElementById('tagSub').setAttribute('visible', i<=2);
      document.getElementById('tagProd').setAttribute('visible', i>=3);
      ['ballA','ballB'].forEach(function(n){ if(COLOR[n]&&parts[n]&&parts[n].mat) parts[n].el.setAttribute('color',COLOR[n][i]); });
      if(instant) applyInstant();
    }

    function tick(now){
      requestAnimationFrame(tick);
      if(!ready) return;
      var dt=last?Math.min(now-last,60):16; last=now;
      Object.keys(parts).forEach(function(n){
        var p=parts[n], t=targetPos(n);
        if(t){ p.o3d.position.x+=(t[0]-p.o3d.position.x)*MOVE;
               p.o3d.position.y+=(t[1]-p.o3d.position.y)*MOVE;
               p.o3d.position.z+=(t[2]-p.o3d.position.z)*MOVE; }
        if(p.mat){ p.mat.transparent=true;
          p.mat.opacity+=(targetOpacity(n)-p.mat.opacity)*MOVE; }
      });
      if(playing){ timer+=dt;
        if(timer>=DWELL){ var next=(stage+1)%STAGES.length; setStage(next, next===0); }
      }
    }

    function buildPips(){ pipsEl.innerHTML=''; STAGES.forEach(function(){var d=document.createElement('div');d.className='pip';pipsEl.appendChild(d);}); }
    function setPlaying(v){ playing=v; playBtn.innerHTML=v?'&#10073;&#10073; Pause':'&#9654; Play'; }

    playBtn.onclick=function(){ setPlaying(!playing); };
    stepBtn.onclick=function(){ setPlaying(false); var n=(stage+1)%STAGES.length; setStage(n,n===0); };
    restartBtn.onclick=function(){ setStage(0,true); setPlaying(true); };

    function fail(t,m){gate.classList.remove('hidden');hud.classList.add('hidden');
      gate.innerHTML='<h1 style="color:#ff6b6b;font-size:18px;letter-spacing:.1em">'+t+'</h1><p style="margin-top:10px">'+m+'</p>';}

    function initScene(){
      host.innerHTML=SCENE;
      var scene=host.querySelector('a-scene');
      function go(){
        ['ballA','ballB','bond','wallL','wallR'].forEach(function(n){parts[n]=grab(n);});
        buildPips(); setStage(0,true); setPlaying(true); ready=true;
        var m=document.getElementById('rxMarker');
        m.addEventListener('markerFound',function(){statusEl.className='locked';labelEl.textContent='Card locked';
          searchHint.classList.add('hidden');panel.classList.remove('hidden');});
        m.addEventListener('markerLost',function(){statusEl.className='searching';labelEl.textContent='Searching for card…';
          searchHint.classList.remove('hidden');panel.classList.add('hidden');});
      }
      if(scene.hasLoaded) go(); else scene.addEventListener('loaded',go);
      requestAnimationFrame(tick);
    }

    startBtn.addEventListener('click',function(){
      if(!window.isSecureContext) return fail('NEEDS HTTPS',
        'Open this over <b>https</b> (your GitHub Pages link), not the file itself or an http address.');
      if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia)
        return fail('CAMERA UNSUPPORTED','Try Chrome (Android) or Safari (iPhone).');
      startBtn.disabled=true; gateNote.textContent='Starting camera…';
      navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}},audio:false})
        .then(function(s){s.getTracks().forEach(function(t){t.stop();});
          gate.classList.add('hidden');hud.classList.remove('hidden');initScene();})
        .catch(function(e){var n=e&&e.name;
          if(n==='NotAllowedError'||n==='SecurityError') fail('CAMERA BLOCKED','Camera access was denied. Allow Camera in the site settings and reload.');
          else if(n==='NotFoundError'||n==='OverconstrainedError') fail('NO CAMERA FOUND','No usable camera on this device.');
          else fail('CAMERA ERROR',(e&&e.message)||'The camera could not start.');});
    });
  })();
  </script>
</body>
</html>
